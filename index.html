<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Match Cut | Arnavsocial</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { 
                        sans: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                    colors: {
                        background: '#f5f5f7',
                        surface: '#ffffff',
                        primary: '#000000',
                    }
                }
            }
        }
    </script>

    <link rel="stylesheet" href="./style.css">

    <link rel="stylesheet" href="https://pyscript.net/releases/2023.11.1/core.css" />
    <script type="module" src="https://pyscript.net/releases/2023.11.1/core.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.js"></script>
</head>
<body class="flex flex-col h-[100dvh]">

    <py-config>
        packages = ["opencv-python", "numpy"]
    </py-config>

    <script type="py" src="./aligner.py"></script>

    <header class="h-16 flex items-center justify-between px-6 md:px-8 shrink-0 z-10 bg-[#f5f5f7] sticky top-0 border-b border-gray-200">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-white shadow-sm squircle flex items-center justify-center border border-gray-100">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="black"><path d="M9 22H15C20 22 22 19 22 15V7C22 4 20 2 15 2H9C4 2 2 4 2 7V15C2 19 4 22 9 22Z" opacity="0.4"/><path d="M15.75 12C15.75 12.41 15.41 12.75 15 12.75H9C8.59 12.75 8.25 12.41 8.25 12C8.25 11.59 8.59 11.25 9 11.25H15C15.41 11.25 15.75 11.59 15.75 12Z"/><circle cx="10" cy="9" r="1"/><circle cx="14" cy="9" r="1"/></svg>
            </div>
            <span class="font-semibold text-2xl tracking-tight text-black">Match Cut</span>
        </div>
        <div class="flex items-center gap-4">
            
            <div class="flex items-center gap-4 mr-2 border-r pr-5 border-gray-300">
                <a href="https://www.potato.com" target="_blank" class="text-gray-400 hover:text-pink-600 transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/></svg>
                </a>
                <a href="https://www.potato.com" target="_blank" class="text-gray-400 hover:text-black transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"/></svg>
                </a>
                <a href="https://www.potato.com" target="_blank" class="text-gray-400 hover:text-red-500 transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
                </a>
            </div>

            <div id="ai-status-badge" class="px-3 py-1.5 rounded-full text-xs font-bold tracking-wide flex items-center gap-1.5 bg-gray-200 text-gray-500 transition-colors">
                <div id="ai-status-dot" class="w-1.5 h-1.5 rounded-full bg-gray-400 animate-pulse"></div>
                <span id="ai-status-text">LOADING AI...</span>
            </div>
        </div>
    </header>

    <div class="flex-1 flex flex-col md:flex-row overflow-hidden p-4 md:p-6 gap-6">
        
        <div class="w-full h-[45vh] md:h-full md:flex-1 relative flex items-center justify-center perspective-1000">
            <div id="canvas-container" class="relative squircle shadow-2xl overflow-hidden border border-black/5 bg-[#121212] transition-transform duration-300 ease-out aspect-square" style="max-height: 100%; max-width: 100%;">
                <canvas id="preview-canvas" class="w-full h-full object-contain"></canvas>
                
                <div class="absolute bottom-6 left-1/2 -translate-x-1/2 flex items-center gap-4 px-6 py-2.5 bg-zinc-900/40 backdrop-blur-xl rounded-full text-white/90 shadow-2xl border border-white/5 transition-transform hover:scale-105 duration-200">
                    <button id="btn-play-pause" class="hover:text-white transition-colors">
                        <svg id="icon-pause" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
                        <svg id="icon-play" class="hidden" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                    </button>
                    <span id="frame-counter" class="font-mono text-xs font-medium opacity-60">0 / 0</span>
                </div>
            </div>
        </div>

        <div class="w-full md:w-[400px] flex flex-col h-full overflow-y-auto pb-6">
            <div class="space-y-6">
                
                <div id="drop-zone" class="group h-32 squircle bg-gray-100 border border-transparent flex flex-col items-center justify-center text-center cursor-pointer transition-all hover:bg-white hover:shadow-md hover:scale-[1.01] duration-300">
                    <input type="file" id="file-input" multiple accept="image/*" class="hidden" />
                    <div class="text-lg font-semibold text-gray-900 mb-1">Tap to add photos,</div>
                    <div class="text-sm text-gray-500">Processed locally for your privacy.</div>
                    <div id="upload-count" class="hidden mt-2 text-[10px] font-bold text-blue-600 bg-blue-100/50 px-2 py-0.5 rounded-full animate-fade-in">0 Loaded</div>
                </div>

                <div class="space-y-3 px-1">
                    <div class="flex items-center justify-between">
                        <span class="text-xs font-bold text-gray-500 uppercase tracking-wide">CANVAS SIZE</span>
                        <div class="flex items-center gap-3">
                            <span class="text-xs font-bold text-gray-500 uppercase tracking-wide">GUIDES</span>
                            <input type="checkbox" id="toggle-guides" class="checkbox-circle" />
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-2" id="ratio-btn-group">
                        <button data-ratio="1:1" class="ratio-btn active-ratio border border-gray-200 p-2 rounded-xl text-xs font-bold bg-white shadow-sm transition-all hover:border-blue-400">SQUARE (1:1)</button>
                        <button data-ratio="9:16" class="ratio-btn border border-gray-200 p-2 rounded-xl text-xs font-bold bg-white shadow-sm transition-all opacity-60 hover:opacity-100 hover:border-blue-400">VERTICAL (9:16)</button>
                        <button data-ratio="16:9" class="ratio-btn border border-gray-200 p-2 rounded-xl text-xs font-bold bg-white shadow-sm transition-all opacity-60 hover:opacity-100 hover:border-blue-400">WIDE (16:9)</button>
                        <button data-ratio="4:5" class="ratio-btn border border-gray-200 p-2 rounded-xl text-xs font-bold bg-white shadow-sm transition-all opacity-60 hover:opacity-100 hover:border-blue-400">PORTRAIT (4:5)</button>
                    </div>
                </div>

                <div class="space-y-3 px-1 mt-6">
                    <div class="flex justify-between items-center">
                        <span class="text-xs font-bold text-black uppercase tracking-wide">FACE SCALE</span>
                        <span id="scale-label" class="text-xs text-gray-500 font-medium font-mono">35%</span>
                    </div>
                    <input type="range" id="slider-scale" min="0.1" max="0.8" step="0.01" value="0.35" />
                </div>

                <div class="space-y-3 px-1">
                    <div class="flex justify-between items-center">
                        <span class="text-xs font-bold text-black uppercase tracking-wide">PLAYBACK SPEED</span>
                        <span id="speed-label" class="text-xs text-gray-500 font-medium font-mono">0.2s</span>
                    </div>
                    <input type="range" id="slider-speed" min="0.05" max="1.0" step="0.05" value="0.2" />
                </div>

                <div class="space-y-3 px-1">
                    <span class="text-xs font-bold text-black uppercase block tracking-wide">EXPORT FORMAT</span>
                    <div class="flex bg-white border border-gray-200 p-1 rounded-xl shadow-sm w-fit">
                        <button id="fmt-gif" class="px-4 py-1.5 rounded-lg text-xs font-bold bg-gray-100 text-black shadow-inner">GIF</button>
                        <button id="fmt-mp4" class="px-4 py-1.5 rounded-lg text-xs font-bold text-gray-400 hover:text-gray-600">MP4</button>
                    </div>
                </div>

                <button id="btn-export" disabled class="w-full h-16 texture-bg text-white squircle font-bold text-lg flex items-center justify-center gap-3 shadow-xl hover:shadow-2xl hover:scale-[1.02] active:scale-[0.98] transition-all duration-300 disabled:opacity-50 disabled:cursor-not-allowed mt-4">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                    <span id="export-text">Export Video</span>
                </button>
                
            </div>
        </div>
    </div>

    <script type="module" src="./main.js"></script>
</body>
</html>
